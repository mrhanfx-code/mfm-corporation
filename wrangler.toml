name = "mfm-corporation-telegram-bot"
main = "src/telegram-bot-agent.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Observability — applied at root level for all deployments
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# Root-level vars — applies for all deployment methods
# Secrets (set via: wrangler secret put <NAME> or Cloudflare Dashboard)
# TELEGRAM_BOT_TOKEN, SENDGRID_API_KEY, WEBHOOK_SECRET, OPENROUTER_API_KEY
[vars]
ENVIRONMENT = "production"
AUTHORIZED_USER_IDS = "6847462500"
CEO_EMAIL = "remy@mfm-corporation.com"
USER_EMAIL = "muhdfarihan@gmail.com"

# Root-level KV binding
[[kv_namespaces]]
binding = "KV"
id = "b7fb55a0476d41b395fb36cf64b0a317"
preview_id = "b7fb55a0476d41b395fb36cf64b0a317"

# Root-level D1 binding
[[d1_databases]]
binding = "db"
database_name = "mfm-corporation-db"
database_id = "91e8699c-2731-4f0d-8a09-9f9765e7e4cc"

# Root-level R2 binding
[[r2_buckets]]
binding = "mfm-corporation-uploads"
bucket_name = "mfm-corporation-uploads"

# Scheduled cron triggers (MYT = UTC+8)
# 00:00 UTC = 08:00 MYT — morning briefing
# 05:00 UTC = 13:00 MYT — midday ops check
# 10:00 UTC = 18:00 MYT — evening digest
[triggers]
crons = ["0 0 * * *", "0 5 * * *", "0 10 * * *"]
