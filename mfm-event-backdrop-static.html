<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFM Corporation - Event Backdrop (Static Print Version)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A3 landscape;
            margin: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .backdrop-container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .backdrop-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .backdrop-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 1400px;
            padding: 0 60px;
            width: 100%;
        }

        .logo-section {
            margin-bottom: 80px;
        }

        .main-logo {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 30px;
            text-shadow: 0 0 100px rgba(102, 126, 234, 0.3);
        }

        .tagline {
            font-size: 2.2rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 60px;
        }

        .metrics-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 50px;
            margin-bottom: 80px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .metric-value {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .metric-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .broadcast-banner {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(240, 147, 251, 0.25) 100%);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 60px;
            margin-bottom: 60px;
        }

        .broadcast-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .broadcast-status {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 20px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.4rem;
            font-weight: 500;
        }

        .status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 30px #10b981;
        }

        .footer-section {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .corner-accent {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .corner-accent.top-left {
            top: -100px;
            left: -100px;
        }

        .corner-accent.top-right {
            top: -100px;
            right: -100px;
        }

        .corner-accent.bottom-left {
            bottom: -100px;
            left: -100px;
        }

        .corner-accent.bottom-right {
            bottom: -100px;
            right: -100px;
        }

        .print-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            
            .print-info {
                display: none;
            }
            
            .backdrop-container {
                width: 100%;
                height: 100vh;
            }
        }

        @media (max-width: 1200px) {
            .main-logo {
                font-size: 6rem;
                letter-spacing: 8px;
            }
            
            .tagline {
                font-size: 1.8rem;
            }
            
            .metrics-section {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
            
            .broadcast-title {
                font-size: 2.8rem;
            }
            
            .broadcast-status {
                gap: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="backdrop-container">
        <div class="backdrop-grid"></div>
        <div class="backdrop-pattern"></div>
        
        <div class="corner-accent top-left"></div>
        <div class="corner-accent top-right"></div>
        <div class="corner-accent bottom-left"></div>
        <div class="corner-accent bottom-right"></div>
        
        <div class="main-content">
            <div class="logo-section">
                <div class="main-logo">MFM</div>
                <div class="tagline">BROADCASTING CORPORATION</div>
            </div>

            <div class="metrics-section">
                <div class="metric-card">
                    <div class="metric-value">100%</div>
                    <div class="metric-label">Quality Standard</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">4K</div>
                    <div class="metric-label">Resolution</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">265ms</div>
                    <div class="metric-label">Response Time</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">A+</div>
                    <div class="metric-label">Commercial Grade</div>
                </div>
            </div>

            <div class="broadcast-banner">
                <div class="broadcast-title">CEO Broadcasting Dashboard</div>
                <div class="broadcast-status">
                    <div class="status-item">
                        <div class="status-indicator"></div>
                        <span>Production Ready</span>
                    </div>
                    <div class="status-item">
                        <div class="status-indicator"></div>
                        <span>Enterprise Grade</span>
                    </div>
                    <div class="status-item">
                        <div class="status-indicator"></div>
                        <span>Global Scale</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-section">
            <p>MFM CORPORATION © 2026 | Broadcasting Excellence</p>
        </div>
        
        <div class="print-info">Static Event Backdrop - Print Version</div>
    </div>
</body>
</html>
