name: Canary Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      canary_percentage:
        description: 'Percentage of traffic to canary (0-100)'
        required: true
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '25'
          - '50'
          - '100'

jobs:
  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Deploy canary to Cloudflare Workers
        run: |
          CANARY_PERCENTAGE=${{ github.event.inputs.canary_percentage || '10' }}
          echo "Deploying canary to ${CANARY_PERCENTAGE}% of traffic"
          wrangler deploy --env canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Wait for canary validation
        run: |
          echo "Waiting 5 minutes for canary validation..."
          sleep 300
      
      - name: Run canary health checks
        run: |
          # Run synthetic monitoring against canary endpoint
          curl -f https://canary.mfm-corp.cc.cd/health || exit 1
          curl -f https://canary.mfm-corp.cc.cd/api/v1/dashboard/status || exit 1
      
      - name: Promote canary to production
        if: success()
        run: |
          echo "Canary validation passed, promoting to production"
          wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Canary validation failed, rolling back"
          wrangler rollback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  monitor-canary:
    name: Monitor Canary
    runs-on: ubuntu-latest
    needs: deploy-canary
    if: github.event.inputs.canary_percentage != '100'
    
    steps:
      - name: Monitor canary metrics
        run: |
          # Check error rates, latency, and other metrics
          # This would integrate with your monitoring system
          echo "Monitoring canary for 10 minutes..."
          sleep 600
          
          # Example: Check if error rate is below threshold
          # ERROR_RATE=$(get_canary_error_rate)
          # if [ "$ERROR_RATE" -gt 5 ]; then
          #   echo "Error rate too high: $ERROR_RATE%"
          #   exit 1
          # fi
          
          echo "Canary monitoring completed successfully"
